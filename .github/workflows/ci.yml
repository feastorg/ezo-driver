name: CI

on:
  push:
  pull_request:

jobs:
  host-build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DEZO_BUILD_TESTS=ON
          -DEZO_BUILD_LINUX_ADAPTER=ON
          -DEZO_BUILD_POSIX_UART_ADAPTER=ON
          -DEZO_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  platformio-arduino-compile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: uno
            sketch: examples/arduino/i2c/raw/smoke/smoke.ino
          - board: uno
            sketch: examples/arduino/i2c/commissioning/inspect_device/inspect_device.ino
          - board: uno
            sketch: examples/arduino/i2c/typed/read_ph/read_ph.ino
          - board: uno
            sketch: examples/arduino/i2c/typed/read_do/read_do.ino
          - board: uno
            sketch: examples/arduino/uart/raw/smoke/smoke.ino
          - board: uno
            sketch: examples/arduino/uart/commissioning/inspect_device/inspect_device.ino
          - board: uno
            sketch: examples/arduino/uart/typed/read_ph/read_ph.ino
          - board: uno
            sketch: examples/arduino/uart/typed/read_do/read_do.ino
          - board: nanoatmega328
            sketch: examples/arduino/i2c/raw/smoke/smoke.ino
          - board: nanoatmega328
            sketch: examples/arduino/i2c/commissioning/inspect_device/inspect_device.ino
          - board: nanoatmega328
            sketch: examples/arduino/i2c/typed/read_ph/read_ph.ino
          - board: nanoatmega328
            sketch: examples/arduino/i2c/typed/read_do/read_do.ino
          - board: nanoatmega328
            sketch: examples/arduino/uart/raw/smoke/smoke.ino
          - board: nanoatmega328
            sketch: examples/arduino/uart/commissioning/inspect_device/inspect_device.ino
          - board: nanoatmega328
            sketch: examples/arduino/uart/typed/read_ph/read_ph.ino
          - board: nanoatmega328
            sketch: examples/arduino/uart/typed/read_do/read_do.ino
          - board: esp32dev
            sketch: examples/arduino/i2c/raw/smoke/smoke.ino
          - board: esp32dev
            sketch: examples/arduino/i2c/commissioning/inspect_device/inspect_device.ino
          - board: esp32dev
            sketch: examples/arduino/i2c/typed/read_ph/read_ph.ino
          - board: esp32dev
            sketch: examples/arduino/i2c/typed/read_do/read_do.ino
          - board: esp32dev
            sketch: examples/arduino/uart/raw/smoke/smoke.ino
          - board: esp32dev
            sketch: examples/arduino/uart/commissioning/inspect_device/inspect_device.ino
          - board: esp32dev
            sketch: examples/arduino/uart/typed/read_ph/read_ph.ino
          - board: esp32dev
            sketch: examples/arduino/uart/typed/read_do/read_do.ino

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
          key: ${{ runner.os }}-platformio-${{ matrix.board }}

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Compile Arduino library example
        env:
          PLATFORMIO_CI_SRC: ${{ matrix.sketch }}
        run: pio ci --lib="." --board="${{ matrix.board }}"

  python-bindings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python bindings test dependencies
        run: python -m pip install --upgrade pip setuptools wheel cffi pytest

      - name: Install bindings package
        run: python -m pip install -e bindings/python

      - name: Run Python bindings tests
        run: python -m pytest bindings/python/tests -q
